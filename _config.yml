#作者: ptw-cwl
#个人网站: ptw-cwl.com
#如有侵权，请联系删除。

markdown: kramdown

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-sitemap

collections:
  posts:
    output: true
  authors:
    output: true
  archives:
    output: true
  websites:
    output: true

defaults:
  - scope:
      type: 'posts'
    values:
      layout: post
      assets: post
      permalink: "blog/:title"
      date: "2022-03-01"
      author: 
         name: ptw-cwl
         url: "/ptw-cwl"
      tags:
        -未分类
  - scope:
      type: 'authors'
    values:
      layout: base
      permalink: "author/:title"
  - scope:
      type: 'archives'
    values:
      layout: base
      permalink: "archive/:title"
  - scope:
      type: 'websites'
    values:
      layout: website


  
exclude:
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - Rakefile
  - README.md
  - tmp
  - log
  - "*.bat"
  - "*.bak"
  - "*.cfg"
  - "*.json"
  - ptw-cwl.gitee.io
  - ptw-cwl.github.io
  - assets/scripts/
  - assets/websites/
